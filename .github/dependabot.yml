# Canonical Dependabot config for the wyre-technology *-mcp / node-* fleet.
#
# Goal: keep PR volume manageable for a small team. Updates are GROUPED so a
# repo gets a handful of PRs per week instead of one-per-package, and the
# dependabot-janitor (daily) auto-merges the green grouped PRs. Only
# PRODUCTION-dependency MAJOR bumps land as individual PRs for human review,
# since those can carry behavioural breaking changes a green test suite misses.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps"
      prefix-development: "deps-dev"
      include: "scope"
    groups:
      # All dev/CI tooling (eslint, vitest, typescript, @types/*, etc.) incl.
      # majors → ONE PR. The janitor auto-merges it when CI is green.
      dev-dependencies:
        dependency-type: "development"
        update-types: ["major", "minor", "patch"]
      # Production minor + patch → ONE PR. Auto-merged when green.
      production-minor-patch:
        dependency-type: "production"
        update-types: ["minor", "patch"]
    # Production MAJORS are intentionally NOT grouped → individual PRs, held for
    # human review (never auto-merged).

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      github-actions:
        patterns: ["*"]

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "docker"
      include: "scope"
    groups:
      docker:
        patterns: ["*"]
